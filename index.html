    <style>
        :root,
        :root[data-theme="light"] {
            --bg: #fffaf2;
            --bg-grad-1: #ffe8d2;
            --bg-grad-2: #ffd9e8;
            --bg-grad-3: #d6e7ff;
            --fg: #1f1b2e;
            --muted: #6b6480;
            --line: #efe6dd;
            --card: rgba(255, 255, 255, 0.72);
            --card-bg-link: rgba(255, 255, 255, 0.6);
            --accent: #ff6f4d;
            --accent-2: #7a5cff;
            --glow: rgba(255, 188, 92, 0.55);
            --glow-soft: rgba(255, 200, 120, 0.35);
            --light-source: radial-gradient(circle at 100% 0%,
                    rgba(255, 214, 130, 0.55) 0%,
                    rgba(255, 180, 120, 0.18) 22%,
                    transparent 55%);
            --card-sheen: linear-gradient(135deg,
                    rgba(255, 235, 190, 0.55) 0%,
                    rgba(255, 255, 255, 0) 45%);
        }

        :root[data-theme="dark"] {
            --bg: #0f0c1a;
            --bg-grad-1: #2a1d3a;
            --bg-grad-2: #1d2742;
            --bg-grad-3: #3a1d2c;
            --fg: #f5f1ff;
            --muted: #a59fbd;
            --line: #2a2438;
            --card: rgba(255, 255, 255, 0.04);
            --card-bg-link: rgba(255, 255, 255, 0.05);
            --accent: #ff8a6b;
            --accent-2: #a98bff;
            --glow: rgba(170, 200, 255, 0.55);
            --glow-soft: rgba(140, 170, 230, 0.3);
            --light-source: radial-gradient(circle at 100% 0%,
                    rgba(180, 205, 255, 0.32) 0%,
                    rgba(140, 170, 230, 0.12) 25%,
                    transparent 60%);
            --card-sheen: linear-gradient(135deg,
                    rgba(190, 210, 255, 0.18) 0%,
                    rgba(255, 255, 255, 0) 50%);
        }

        @media (prefers-color-scheme: dark) {
            :root:not([data-theme]) {
                --bg: #0f0c1a;
                --bg-grad-1: #2a1d3a;
                --bg-grad-2: #1d2742;
                --bg-grad-3: #3a1d2c;
                --fg: #f5f1ff;
                --muted: #a59fbd;
                --line: #2a2438;
                --card: rgba(255, 255, 255, 0.04);
                --card-bg-link: rgba(255, 255, 255, 0.05);
                --accent: #ff8a6b;
                --accent-2: #a98bff;
                --glow: rgba(170, 200, 255, 0.55);
                --glow-soft: rgba(140, 170, 230, 0.3);
            }
        }

        * {
            box-sizing: border-box;
        }

        html,
        body {
            margin: 0;
            padding: 0;
        }

        body {
            position: relative;
            min-height: 100vh;
            min-height: 100dvh;
            background-color: var(--bg);
            background-image:
                radial-gradient(circle at 15% 20%, var(--bg-grad-1) 0%, transparent 45%),
                radial-gradient(circle at 85% 10%, var(--bg-grad-2) 0%, transparent 50%),
                radial-gradient(circle at 70% 90%, var(--bg-grad-3) 0%, transparent 55%);
            background-attachment: fixed;
            color: var(--fg);
            font-family:
                -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue",
                Arial, sans-serif;
            font-size: clamp(15px, 1.6vw, 17px);
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
            text-rendering: optimizeLegibility;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: max(88px, env(safe-area-inset-top, 0px) + 80px) clamp(16px, 5vw, 32px) max(40px, env(safe-area-inset-bottom, 0px) + 32px);
            transition: background-color 0.6s ease, color 0.6s ease;
        }

        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background: var(--light-source);
            pointer-events: none;
            z-index: 0;
            transition: opacity 0.6s ease, background 0.6s ease;
        }

        main {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 540px;
            padding: 8px 4px;
            text-align: center;
        }

        h1 {
            font-size: clamp(1.85rem, 6.5vw, 2.6rem);
            font-weight: 700;
            letter-spacing: -0.02em;
            margin: 0 0 0.35em;
            line-height: 1.15;
            background: linear-gradient(120deg, var(--accent), var(--accent-2));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            filter: drop-shadow(0 0 18px var(--glow));
            transition: filter 0.6s ease;
        }

        .bio {
            margin: 0 0 2em;
            color: var(--fg);
            font-size: clamp(0.98rem, 1.6vw, 1.05rem);
            text-shadow: 0 0 22px var(--glow-soft);
            text-wrap: balance;
            transition: text-shadow 0.6s ease;
        }

        .role {
            margin: 0 0 1.5em;
            color: var(--muted);
            font-size: clamp(0.98rem, 1.6vw, 1.05rem);
            text-wrap: balance;
        }

        .role a {
            color: var(--fg);
            text-decoration: none;
            font-weight: 600;
            border-bottom: 1px solid var(--line);
            transition: border-color 0.2s ease, color 0.2s ease;
        }

        .role a:hover {
            color: var(--accent);
            border-bottom-color: var(--accent);
        }

        .links {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
            margin: 0 0 2.5em;
            padding: 0;
            list-style: none;
        }

        .links a {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 16px;
            border: 1px solid var(--line);
            border-radius: 999px;
            background: var(--card-bg-link);
            color: var(--fg);
            text-decoration: none;
            font-size: 0.95rem;
            font-weight: 500;
            transition: transform 0.15s ease, box-shadow 0.2s ease,
                border-color 0.2s ease, background 0.6s ease;
        }

        .links a:hover {
            transform: translateY(-2px);
            border-color: var(--accent);
            box-shadow: 0 10px 24px -14px var(--accent);
        }

        .links svg {
            width: 16px;
            height: 16px;
        }

        .theme-toggle {
            position: fixed;
            top: max(16px, env(safe-area-inset-top, 0px) + 12px);
            right: max(16px, env(safe-area-inset-right, 0px) + 12px);
            z-index: 10;
            width: 44px;
            height: 44px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 0;
            border: 1px solid var(--line);
            border-radius: 999px;
            background: var(--card);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            color: var(--fg);
            cursor: pointer;
            box-shadow: 0 8px 24px -10px var(--glow);
            transition: transform 0.2s ease, box-shadow 0.3s ease,
                background 0.6s ease, border-color 0.6s ease;
        }

        .theme-toggle:hover {
            transform: rotate(-12deg) scale(1.05);
            box-shadow: 0 10px 28px -8px var(--glow);
        }

        .theme-toggle:focus-visible {
            outline: 2px solid var(--accent);
            outline-offset: 3px;
        }

        .theme-toggle svg {
            width: 20px;
            height: 20px;
            transition: transform 0.4s ease, opacity 0.3s ease;
        }

        .theme-toggle .icon-sun,
        .theme-toggle .icon-moon {
            position: absolute;
        }

        :root[data-theme="light"] .theme-toggle .icon-sun {
            opacity: 0;
            transform: rotate(90deg) scale(0.5);
        }

        :root[data-theme="light"] .theme-toggle .icon-moon {
            opacity: 1;
            transform: rotate(0deg) scale(1);
        }

        :root[data-theme="dark"] .theme-toggle .icon-sun {
            opacity: 1;
            transform: rotate(0deg) scale(1);
        }

        :root[data-theme="dark"] .theme-toggle .icon-moon {
            opacity: 0;
            transform: rotate(-90deg) scale(0.5);
        }

        footer {
            color: var(--muted);
            font-size: clamp(0.8rem, 1.4vw, 0.85rem);
            border-top: 1px solid var(--line);
            padding-top: 1.25em;
            text-wrap: balance;
        }

        footer a {
            color: inherit;
            text-decoration: none;
            border-bottom: 1px dotted var(--muted);
        }

        footer a:hover {
            color: var(--accent);
            border-bottom-color: var(--accent);
        }

        /* --- Responsive tweaks --- */
        @media (max-width: 480px) {
            .links {
                gap: 8px;
            }

            .links a {
                padding: 9px 14px;
                font-size: 0.92rem;
            }

            .theme-toggle {
                width: 40px;
                height: 40px;
            }

            .theme-toggle svg {
                width: 18px;
                height: 18px;
            }
        }

        /* Disable hover-only transforms on touch devices to avoid sticky :hover state */
        @media (hover: none) {
            .theme-toggle:hover {
                transform: none;
            }

            .links a:hover {
                transform: none;
            }
        }

        /* Respect users who prefer less motion */
        @media (prefers-reduced-motion: reduce) {

            *,
            *::before,
            *::after {
                transition-duration: 0.001ms !important;
                animation-duration: 0.001ms !important;
            }
        }
    </style>
</head>

    <script>
        (function () {
            var btn = document.querySelector(".theme-toggle");
            if (!btn) return;
            btn.addEventListener("click", function () {
                var current =
                    document.documentElement.getAttribute("data-theme") || "light";
                var next = current === "dark" ? "light" : "dark";
                document.documentElement.setAttribute("data-theme", next);
                try {
                    localStorage.setItem("theme", next);
                } catch (e) { }
            });
        })();
    </script>
